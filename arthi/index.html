							<div class="inner" x-show="currentExamType == 'CE'">

								<div class="field" style="max-width: 20em; margin: auto">
									<select @change="setCEDeck($event.target.value)" name="deck-selector" id="deck-selector">
										<option value="1">General Deck #1</option>
										<option value="2">General Deck #2</option>
										<option value="3">Which document should be used?</option>
										<option value="4">Who is responsible?</option>
										<option value="5">What should the architect do FIRST?</option>
									</select>
								</div>

									<li><a @click="setCEDeck(2)" class="button">Deck #2</a></li>
									<li><a @click="setCEDeck(3)" class="button">Deck #3</a></li>

								<!-- Deck #1 -->
								<div x-show="currentCEDeck == 1">
									<div class="card-carousel" aria-roledescription="carousel">
										
										<ul class="icons" style="margin: 0;">
											<li><a @click="previousCECard()" title="Previous Card" class="icon solid fa-chevron-left"></a></li>
										</ul>
										<div class="business-card" role="button" aria-pressed="false" tabindex="0" aria-label="Business card">
											<div class="card-inner">
												<div class="card-face card-front">
													<div class="card-content">
														<div x-html="currentCECard.front"></div>
													</div>
												</div>
												<div class="card-face card-back" aria-hidden="true">
													<div class="card-content">
														<div x-html="currentCECard.back"></div>
													</div>
												</div>
											</div>
										</div>
										<ul class="icons" style="margin: 0;">
											<li><a @click="nextCECard()" title="Next Card" class="icon solid fa-chevron-right"></a></li>
										</ul>
									</div>
									<div style="display: flex; justify-content: space-around; align-items: center; margin-top: 0.5rem;">
									
										<ul class="icons" style="margin: 0;">
											<li><a @click="backToCEStart()" title="Back to Start" class="icon solid fa-fast-backward"></a></li>
										</ul>
										<p style="margin: 0" class="card-counter">Card <span x-text="currentCECard.index + 1"></span> of <span x-text="CEcards.length"></span></p>
										<ul class="icons" style="margin: 0;">
											<li><a @click="shuffleCECards()" title="Shuffle Cards" class="icon solid fa-random"></a></li>
										</ul>
									
									</div>
									<div class="progress">
										<div class="bar"
											:style="`width: ${(currentCECard.index+1)/CEcards.length*100}%; border-radius: 9999px; transition: width 0.3s ease; opacity: 1;`">
										</div>
									</div>
								</div>
